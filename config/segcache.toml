daemonize = false

[admin]
# interfaces listening on
host = "0.0.0.0"
# port listening on
port = "9999"

# enable the http admin port?
http_enabled = true
# http listening interface
http_host = "0.0.0.0"
# http listening port
http_port = "9998"

[server]
# interfaces listening on
host = "0.0.0.0"
# port listening on
port = "12321"
# epoll timeout in milliseconds
timeout = 100
# epoll max events returned
nevent = 1024

[worker]
# epoll timeout in milliseconds
timeout = 100
# epoll max events returned
nevent = 1024
# number of worker threads
threads = 1

# storage configuration
[seg]
# hash power adjusts how many items can be held in the hashtable
hash_power = 22
# total bytes to use for item storage
heap_size = "4GB"
# size of each segment
segment_size = "1MB"
# number of segments for a non-evict compaction
compact_target = 2
# number of segments to merge in one merge eviction pass
merge_target = 4
# max number of segments to merge in one pass
merge_max = 8
# use merge based eviction
eviction = "Merge"
# s3fifo admission pool ratio (used when eviction = "S3Fifo")
# admission_ratio = 0.10

[time]
time_type = "Memcache"

[buf]

[debug]
# choose from: error, warn, info, debug, trace
log_level = "info"
# optionally, log to the file below instead of standard out
# log_file = "segcache.log"
# rotation interval: none, minutely, hourly, daily
# log_rotation_interval = "daily"
# max number of rotated log files to keep
# log_max_keep_files = 7

[klog]
# optionally, log commands to the file below
# file = "segcache.cmd"
# trigger log rotation when the file grows beyond this size (in bytes)
max_size = "1GB"
# max number of rotated log files to keep
# max_keep_files = 3
# specify the sampling ratio, 1 in N commands will be logged. Setting to '0'
# will disable command logging.
sample = 100

[sockio]

[tcp]

[tls]
# certificate chain used to validate client certificate
# certificate_chain = "client.chain"
# server certificate
# certificate = "server.crt"
# server private key
# private_key = "server.key"
# ca certificate file used as the root of trust
# ca_file = "ca.crt"
